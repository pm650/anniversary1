<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Anniversary</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400;1,700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Great+Vibes&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --deep-red: #1a0005;
    --mid-red: #5c0020;
    --rose: #9b1b30;
    --blush: #e8a0b0;
    --gold: #c9a84c;
    --gold-light: #e8c97a;
    --cream: #fdf6f0;
    --text-dark: #2d0a14;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
  }

  body {
    font-family: 'Cormorant Garamond', serif;
    background: radial-gradient(ellipse at 50% 0%, #3d0015 0%, #1a0005 40%, #0d0002 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    position: relative;
  }

  /* ── BACKGROUND SPARKLES ── */
  #bg-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 0;
  }

  /* ── HEART PARTICLES ── */
  #particle-canvas {
    position: fixed; inset: 0;
    pointer-events: none; z-index: 1;
  }

  /* ── AMBIENT GLOW ── */
  .ambient {
    position: fixed; border-radius: 50%;
    filter: blur(80px); pointer-events: none; z-index: 0;
    animation: ambPulse 6s ease-in-out infinite alternate;
  }
  .amb1 {
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(180,20,50,0.18) 0%, transparent 70%);
    top: -120px; left: 50%; transform: translateX(-50%);
  }
  .amb2 {
    width: 400px; height: 400px;
    background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 70%);
    bottom: -150px; right: -100px;
    animation-delay: -3s;
  }
  @keyframes ambPulse {
    from { opacity: 0.55; }
    to   { opacity: 1; }
  }

  /* ── SCENE ── */
  #scene {
    position: relative; z-index: 10;
    display: flex; align-items: center; justify-content: center;
  }

  /* ── ENVELOPE WRAPPER ── */
  #env-wrap {
    position: relative;
    cursor: pointer;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
    transition: opacity 0.7s ease, transform 0.7s ease;
  }

  /* ── ENVELOPE ── */
  #envelope {
    width: clamp(280px, 80vw, 420px);
    height: clamp(185px, 53vw, 280px);
    position: relative;
    filter: drop-shadow(0 28px 65px rgba(180,0,30,0.55)) drop-shadow(0 0 35px rgba(180,0,30,0.18));
    transition: filter 0.35s ease, transform 0.35s ease;
  }
  #env-wrap:hover #envelope {
    filter: drop-shadow(0 38px 85px rgba(220,20,60,0.65)) drop-shadow(0 0 55px rgba(220,20,60,0.28));
    transform: translateY(-5px);
  }

  .env-body {
    position: absolute; inset: 0;
    border-radius: 4px 4px 8px 8px;
    background: linear-gradient(170deg, #5c0020 0%, #3a0012 50%, #250008 100%);
    border: 1px solid rgba(201,168,76,0.3);
  }
  .env-body::after {
    content: '';
    position: absolute; inset: 0;
    background-image: repeating-linear-gradient(
      45deg, transparent, transparent 8px,
      rgba(201,168,76,0.025) 8px, rgba(201,168,76,0.025) 9px
    );
    border-radius: inherit;
  }

  /* Side V folds */
  .env-fold-l {
    position: absolute; top: 0; left: 0;
    width: 0; height: 0;
    border-top: clamp(93px,27vw,140px) solid transparent;
    border-bottom: clamp(93px,27vw,140px) solid transparent;
    border-left: clamp(70px,20vw,105px) solid rgba(70,0,18,0.45);
    pointer-events: none;
  }
  .env-fold-r {
    position: absolute; top: 0; right: 0;
    width: 0; height: 0;
    border-top: clamp(93px,27vw,140px) solid transparent;
    border-bottom: clamp(93px,27vw,140px) solid transparent;
    border-right: clamp(70px,20vw,105px) solid rgba(55,0,14,0.4);
    pointer-events: none;
  }

  /* Bottom V folds */
  .env-bot-l {
    position: absolute; bottom: 0; left: 0;
    width: 0; height: 0;
    border-style: solid;
    border-color: transparent;
    border-bottom-color: rgba(80,0,20,0.55);
    border-bottom-width: clamp(90px,26vw,138px);
    border-left-width: clamp(140px,40vw,210px);
    pointer-events: none;
  }
  .env-bot-r {
    position: absolute; bottom: 0; right: 0;
    width: 0; height: 0;
    border-style: solid;
    border-color: transparent;
    border-bottom-color: rgba(60,0,15,0.5);
    border-bottom-width: clamp(90px,26vw,138px);
    border-right-width: clamp(140px,40vw,210px);
    pointer-events: none;
  }

  /* Gold wax seal */
  .seal {
    position: absolute;
    bottom: clamp(14px,4vw,20px); left: 50%;
    transform: translateX(-50%);
    width: clamp(44px,12vw,60px); height: clamp(44px,12vw,60px);
    border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #e8c97a 0%, #c9a84c 40%, #8b6914 100%);
    box-shadow:
      0 0 0 2px rgba(201,168,76,0.45),
      0 0 18px rgba(201,168,76,0.4),
      inset 0 1px 3px rgba(255,255,255,0.35),
      inset 0 -1px 3px rgba(0,0,0,0.3);
    display: flex; align-items: center; justify-content: center;
    z-index: 5;
    transition: transform 0.3s ease;
  }
  #env-wrap:hover .seal { transform: translateX(-50%) scale(1.1); }

  .seal span {
    font-size: clamp(18px,5vw,26px);
    filter: drop-shadow(0 1px 2px rgba(0,0,0,0.3));
    line-height: 1;
  }

  /* ── FLAP ── */
  #flap {
    position: absolute; top: 0; left: 0; right: 0;
    height: 55%;
    transform-origin: top center;
    transform-style: preserve-3d;
    transition: transform 1s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 10;
  }

  .flap-front {
    position: absolute; inset: 0; overflow: hidden;
  }
  .flap-front::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 100%;
    clip-path: polygon(0 0, 100% 0, 50% 95%);
    background: linear-gradient(180deg, #6d0025 0%, #4a0018 55%, #320010 100%);
    border-left: 1px solid rgba(201,168,76,0.18);
    border-right: 1px solid rgba(201,168,76,0.18);
  }
  .flap-front::after {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 100%;
    clip-path: polygon(0 0, 100% 0, 50% 95%);
    background: linear-gradient(180deg, rgba(201,168,76,0.14) 0%, transparent 55%);
  }

  .flap-back {
    position: absolute; inset: 0; overflow: hidden;
    backface-visibility: hidden;
    transform: rotateX(180deg);
  }
  .flap-back::before {
    content: '';
    position: absolute; top: 0; left: 0; right: 0; height: 100%;
    clip-path: polygon(0 0, 100% 0, 50% 95%);
    background: linear-gradient(180deg, #1e0008 0%, #12000400 100%);
  }

  #env-wrap.open #flap {
    transform: rotateX(-182deg);
  }

  /* ── HINT ── */
  #hint {
    position: absolute;
    bottom: clamp(-40px,-11vw,-52px); left: 50%;
    transform: translateX(-50%);
    white-space: nowrap;
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(11px,3vw,14px);
    font-style: italic;
    letter-spacing: 3px;
    color: rgba(201,168,76,0.6);
    animation: hintBlink 2.6s ease-in-out infinite;
    pointer-events: none;
    transition: opacity 0.4s;
  }
  @keyframes hintBlink {
    0%,100% { opacity: 0.35; }
    50%      { opacity: 0.95; }
  }

  /* ── CARD ── */
  #card {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) translateY(50px) scale(0.88);
    width: clamp(300px, 86vw, 430px);
    background: linear-gradient(168deg, #fdf6f0 0%, #fae8e4 45%, #f5d5cf 100%);
    border-radius: 14px;
    padding: clamp(28px,7vw,48px) clamp(24px,6vw,44px) clamp(32px,8vw,52px);
    box-shadow:
      0 80px 120px rgba(0,0,0,0.6),
      0 30px 60px rgba(90,0,20,0.4),
      0 0 0 1px rgba(201,168,76,0.25),
      inset 0 1px 0 rgba(255,255,255,0.95);
    opacity: 0;
    pointer-events: none;
    z-index: 20;
    text-align: center;
    transition:
      opacity 0.85s cubic-bezier(0.22,1,0.36,1) 0.65s,
      transform 0.85s cubic-bezier(0.22,1,0.36,1) 0.65s;
    overflow: hidden;
  }
  #card::after {
    content: '';
    position: absolute; inset: 14px;
    border: 1px solid rgba(201,168,76,0.18);
    border-radius: 8px;
    pointer-events: none;
  }
  #card.revealed {
    opacity: 1;
    transform: translate(-50%, -50%) translateY(0) scale(1);
    pointer-events: all;
  }

  /* Card children fade-in */
  .c { opacity: 0; transform: translateY(10px); transition: opacity 0.7s ease, transform 0.7s ease; }
  #card.revealed .c { opacity: 1; transform: translateY(0); }
  .d1  { transition-delay: 1.35s; }
  .d2  { transition-delay: 1.5s;  }
  .d3  { transition-delay: 1.65s; }
  .d4  { transition-delay: 1.8s;  }
  .d5  { transition-delay: 2.05s; }
  .d6  { transition-delay: 2.25s; }
  .d7  { transition-delay: 2.45s; }

  /* Divider */
  .divider {
    display: flex; align-items: center; gap: 10px;
    margin: 8px 0;
  }
  .div-line { flex:1; height:1px; background: linear-gradient(90deg,transparent,rgba(201,168,76,0.5),transparent); }
  .div-gem  { width:5px; height:5px; background:rgba(201,168,76,0.6); transform:rotate(45deg); flex-shrink:0; }

  /* Title */
  .card-title {
    font-family: 'Great Vibes', cursive;
    font-size: clamp(38px,10.5vw,58px);
    color: #6d0025;
    line-height: 1.1;
    margin: 4px 0 6px;
    text-shadow: 0 2px 22px rgba(109,0,37,0.22);
  }

  /* Eyebrow text */
  .eyebrow {
    font-size: clamp(9px,2.5vw,11px);
    letter-spacing: 5px;
    text-transform: uppercase;
    color: rgba(201,168,76,0.65);
    margin-bottom: 6px;
  }

  /* Photo */
  .photo-ring {
    margin: 18px auto 20px;
    width: clamp(130px,36vw,168px);
    height: clamp(130px,36vw,168px);
    border-radius: 50%;
    padding: 3px;
    background: conic-gradient(#c9a84c 0deg, #e8c97a 90deg, #c9a84c 180deg, #8b6914 270deg, #c9a84c 360deg);
    box-shadow: 0 0 0 7px rgba(201,168,76,0.1), 0 20px 48px rgba(109,0,37,0.28);
    cursor: pointer;
    position: relative;
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .photo-ring:hover { transform: scale(1.04); box-shadow: 0 0 0 9px rgba(201,168,76,0.15), 0 24px 56px rgba(109,0,37,0.35); }

  .photo-inner {
    width: 100%; height: 100%;
    border-radius: 50%;
    overflow: hidden;
    background: linear-gradient(145deg, #f5d0d5, #e8b5bc, #d4909a);
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  .ph-placeholder {
    display: flex; flex-direction: column; align-items: center; gap: 7px;
    color: rgba(109,0,37,0.45);
    pointer-events: none;
  }
  .ph-placeholder svg {
    width: clamp(26px,7.5vw,34px);
    height: clamp(26px,7.5vw,34px);
    fill: currentColor;
  }
  .ph-placeholder span {
    font-size: clamp(9px,2.5vw,11px);
    letter-spacing: 1.5px; text-transform: uppercase;
    text-align: center; line-height: 1.5;
    max-width: 85px;
  }

  #photo-preview {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover; border-radius: 50%;
    display: none;
  }
  #photo-input { display: none; }

  /* Message */
  .card-msg {
    font-family: 'Playfair Display', serif;
    font-style: italic;
    font-size: clamp(19px,5.2vw,25px);
    color: #4a1020;
    letter-spacing: 0.5px;
    line-height: 1.55;
  }

  .card-sig {
    font-size: clamp(10px,2.8vw,12px);
    letter-spacing: 4px; text-transform: uppercase;
    color: rgba(109,0,37,0.38);
    margin-top: 18px;
  }

  .card-hearts {
    font-size: 13px; letter-spacing: 10px;
    color: rgba(155,27,48,0.4);
    margin-top: 14px;
  }
</style>
</head>
<body>

<div class="ambient amb1"></div>
<div class="ambient amb2"></div>
<canvas id="bg-canvas"></canvas>
<canvas id="particle-canvas"></canvas>

<!-- ENVELOPE -->
<div id="scene">
  <div id="env-wrap" onclick="openEnvelope()" role="button" aria-label="Open anniversary card">
    <div id="envelope">
      <div class="env-body"></div>
      <div class="env-fold-l"></div>
      <div class="env-fold-r"></div>
      <div class="env-bot-l"></div>
      <div class="env-bot-r"></div>
      <div class="seal"><span>♥</span></div>
      <div id="flap">
        <div class="flap-front"></div>
        <div class="flap-back"></div>
      </div>
    </div>
    <div id="hint">tap to open</div>
  </div>
</div>

<!-- CARD -->

  <div class="c d5 card-msg">"Always and Forever."</div>
  <div class="c d6 card-sig">With all my love</div>
  <div class="c d7 card-hearts">♥ &nbsp; ♥ &nbsp; ♥</div>
</div>

<script>
/* ── SPARKLE FIELD ── */
(function(){
  const c = document.getElementById('bg-canvas'), ctx = c.getContext('2d');
  let W, H, stars = [];
  function resize(){ W = c.width = innerWidth; H = c.height = innerHeight; }
  addEventListener('resize', resize); resize();
  function mk(){ return { x:Math.random()*W, y:Math.random()*H+H, r:Math.random()*1.2+0.2,
    a:Math.random()*0.3+0.05, vy:Math.random()*0.18+0.04, tw:Math.random()*Math.PI*2, ts:Math.random()*0.018+0.004 }; }
  for(let i=0;i<130;i++){ const s=mk(); s.y=Math.random()*H; stars.push(s); }
  function draw(){
    ctx.clearRect(0,0,W,H);
    stars.forEach((s,i)=>{ s.tw+=s.ts; s.y-=s.vy;
      if(s.y<-4){ stars[i]=mk(); }
      ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
      ctx.fillStyle=`rgba(201,168,76,${s.a*(0.55+0.45*Math.sin(s.tw))})`; ctx.fill();
    }); requestAnimationFrame(draw);
  } draw();
})();

/* ── HEART PARTICLES ── */
const pc = document.getElementById('particle-canvas'), px = pc.getContext('2d');
let pW, pH, parts = [], burst = false;
function resizeP(){ pW=pc.width=innerWidth; pH=pc.height=innerHeight; }
addEventListener('resize',resizeP); resizeP();

function heart(ctx,x,y,s){
  ctx.beginPath();
  ctx.moveTo(x,y+s*.3);
  ctx.bezierCurveTo(x,y,x-s*.5,y,x-s*.5,y+s*.3);
  ctx.bezierCurveTo(x-s*.5,y+s*.65,x,y+s*.95,x,y+s*1.1);
  ctx.bezierCurveTo(x,y+s*.95,x+s*.5,y+s*.65,x+s*.5,y+s*.3);
  ctx.bezierCurveTo(x+s*.5,y,x,y,x,y+s*.3); ctx.closePath();
}

function mkP(b){
  const a = b ? -(Math.random()*Math.PI+.1) : -(Math.random()*Math.PI*2);
  const spd = b ? Math.random()*4.5+2 : Math.random()*.7+.2;
  const rose = Math.random()<.55;
  return {
    x: b ? pW*.5+(Math.random()-.5)*80 : Math.random()*pW,
    y: b ? pH*.55 : Math.random()*pH+pH,
    vx:Math.cos(a)*spd, vy:Math.sin(a)*spd,
    size: Math.random()*(b?13:7)+3,
    alpha: b?.9:Math.random()*.28+.05,
    rot:Math.random()*Math.PI*2, rs:(Math.random()-.5)*.05,
    grav: b?.065:0,
    h: rose?345+Math.random()*20:42+Math.random()*12,
    s: Math.random()*25+60, l: Math.random()*20+50,
    fade: b?.013:.0025, b
  };
}

for(let i=0;i<22;i++){ const p=mkP(false); p.y=Math.random()*pH; parts.push(p); }

function animP(){
  px.clearRect(0,0,pW,pH);
  if(!burst&&Math.random()<.035) parts.push(mkP(false));
  parts = parts.filter(p=>p.alpha>.004&&p.y>-80&&p.y<pH+80);
  parts.forEach(p=>{
    p.x+=p.vx; p.y+=p.vy+(p.b?0:-.38); p.vy+=p.grav;
    p.rot+=p.rs; p.alpha-=p.fade;
    px.save(); px.globalAlpha=Math.max(0,p.alpha);
    px.translate(p.x,p.y); px.rotate(p.rot);
    heart(px,0,-p.size*.5,p.size);
    px.fillStyle=`hsl(${p.h},${p.s}%,${p.l}%)`; px.fill();
    px.restore();
  }); requestAnimationFrame(animP);
} animP();

/* ── OPEN ENVELOPE ── */
let opened = false;
function openEnvelope(){
  if(opened) return; opened=true;
  const wrap=document.getElementById('env-wrap');
  const hint=document.getElementById('hint');
  const card=document.getElementById('card');

  hint.style.opacity='0';
  wrap.classList.add('open');

  // Heart burst from seal
  setTimeout(()=>{
    burst=true;
    for(let i=0;i<50;i++) setTimeout(()=>parts.push(mkP(true)), i*18);
    setTimeout(()=>{ burst=false; },1100);
  }, 420);

  // Fade envelope out
  setTimeout(()=>{
    wrap.style.opacity='0'; wrap.style.transform='translateY(45px) scale(0.88)';
    wrap.style.pointerEvents='none';
  }, 850);

  // Reveal card
  setTimeout(()=>{ card.classList.add('revealed'); }, 780);
}

/* ── PHOTO UPLOAD ── */
function handlePhoto(e){
  const f=e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=ev=>{
    const img=document.getElementById('photo-preview');
    const ph=document.getElementById('ph-icon');
    img.src=ev.target.result; img.style.display='block'; ph.style.display='none';
  };
  r.readAsDataURL(f);
}
</script>
